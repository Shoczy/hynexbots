name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # The main bot: node:test suite (config-service, orders, invite, secrets).
  # Needs Node ≥22.5 for the built-in node:sqlite the config service uses.
  bot-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bot/package-lock.json
      - run: npm ci
      - run: npm test

  # The two Next.js apps: a production build catches type errors and broken
  # imports. Build-time env isn't required — config is read at runtime.
  web-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [website, dashboard]
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - run: npm ci
      - run: npm run build
